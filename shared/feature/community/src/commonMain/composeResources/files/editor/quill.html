<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="quill.snow.css">
    <script src="quill.min.js"></script>
    <script src="purify.min.js"></script>

    <style>
        /* ===== Quill Editor Full-Height Layout (WebView) ===== */

        html, body {
          height: 100%;
          margin: 0;
          background: #ffffff;
        }

        body {
          display: flex;
          flex-direction: column;
        }

        /* Quill mounts into this element */
        #editor-container {
          flex: 1;                 /* fill remaining height */
          min-height: 0;           /* important for flex children + scrolling */
          background-color: #ffffff;
          padding: 0;              /* padding is applied to .ql-editor */
          box-sizing: border-box;
        }

        /* Remove Quill borders / toolbar */
        .ql-container.ql-snow { border: none; }
        .ql-toolbar.ql-snow { display: none; }

        /* Make Quill internals stretch */
        #editor-container .ql-container {
          height: 100%;
          min-height: 0;
          border: none;
          box-sizing: border-box;
        }

        #editor-container .ql-editor {
          height: 100%;
          min-height: 100%;
          left: 16px;
          right: 16px;
          box-sizing: border-box;
          overflow-y: auto;

          /* Basic typography */
          font-size: 14px;
          line-height: 1.6;
          color: #222;
          word-break: break-word;
          white-space: pre-wrap;
        }

        /* Placeholder style */
        #editor-container .ql-editor.ql-blank::before {
          left: 12px;
          right: 12px;
          margin: 0;
          color: #888;
          font-style: italic;
        }

        /* Images fit container */
        #editor-container .ql-editor img {
          max-width: 100%;
          height: auto;
          display: block;
          margin: 8px 0;
        }

        /* Code block style */
        #editor-container .ql-editor pre {
          padding: 10px;
          border-radius: 8px;
          background: rgba(0, 0, 0, 0.06);
          overflow-x: auto;
        }
    </style>
</head>

<body>
<div id="editor-container"></div>

<script>
    const PLACEHOLDER =
      "내용을 입력해주세요. 커뮤니티 이용 규칙에 의해 부적절한 게시물은 숨김, 삭제 처리될 수 있습니다.";

    const PURIFY_CONFIG = {
      // Keep this list tight. Add only what you really need.
      ALLOWED_TAGS: [
        "b","strong","i","em","u",
        "p","br","div","span",
        "ul","ol","li",
        "blockquote",
        "pre","code",
        "h1","h2","h3","h4","h5","h6",
        "a","img"
      ],
      ALLOWED_ATTR: [
        "href","src","alt","title","target","rel",
        "class","style"
      ],
      // Prevent data: urls unless you explicitly need them
      ALLOW_DATA_ATTR: false,
      // Keep unknown protocols blocked by default
      // DOMPurify will remove javascript: etc.
    };

    function sanitizeHtml(html) {
      if (!html) return "";
      if (window.DOMPurify) {
        return window.DOMPurify.sanitize(html, PURIFY_CONFIG);
      }
      // Fallback: if DOMPurify not available, return empty or minimal safe string
      // (Better to fail safe than to allow XSS)
      return "";
    }

    function normalizeLinks(container) {
      // Ensure links are safe: remove javascript: and force rel/target
      const links = container.querySelectorAll("a");
      links.forEach(a => {
        const href = (a.getAttribute("href") || "").trim();

        // Block dangerous protocols
        if (/^javascript:/i.test(href) || /^data:/i.test(href)) {
          a.removeAttribute("href");
        }

        // Optional: open in new tab (WebView may handle differently)
        a.setAttribute("target", "_blank");
        a.setAttribute("rel", "noopener noreferrer");
      });
    }

    function postHtmlChanged(html) {
      // Android bridge
      try {
        if (window.AndroidBridge && typeof window.AndroidBridge.onHtmlChanged === "function") {
          window.AndroidBridge.onHtmlChanged(html);
        }
      } catch (e) {}

      // iOS bridge
      try {
        if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.htmlChanged) {
          window.webkit.messageHandlers.htmlChanged.postMessage(html);
        }
      } catch (e) {}
    }

    function notifyHtmlChanged() {
      const raw = quill.root.innerHTML;
      const clean = sanitizeHtml(raw);

      // DOMPurify returns a string. Normalize links by DOM parsing.
      const tmp = document.createElement("div");
      tmp.innerHTML = clean;
      normalizeLinks(tmp);

      const finalHtml = tmp.innerHTML;
      postHtmlChanged(finalHtml);
    }

    // -----------------------------
    // Init Quill
    // -----------------------------
    const quill = new Quill("#editor-container", {
      theme: "snow",
      placeholder: PLACEHOLDER,
      modules: {
        toolbar: false,
        history: { delay: 1000, maxStack: 100, userOnly: true }
      }
    });

    // When text changes, send sanitized HTML
    quill.on("text-change", function() {
      notifyHtmlChanged();
    });

    // -----------------------------
    // Public API (called from Kotlin)
    // -----------------------------
    window.EditorApi = {
      setHtml: function(content) {
        const clean = sanitizeHtml(content || "");

        // Normalize links after sanitize
        const tmp = document.createElement("div");
        tmp.innerHTML = clean;
        normalizeLinks(tmp);

        // Insert into editor
        quill.clipboard.dangerouslyPasteHTML(tmp.innerHTML);
        notifyHtmlChanged();
      },

      getHtml: function() {
        // Return sanitized current content
        const raw = quill.root.innerHTML;
        return sanitizeHtml(raw);
      },

      toggleBold: function() {
        const range = quill.getSelection();
        if (!range) return;

        const fmt = quill.getFormat(range);
        quill.format("bold", !fmt.bold, "user");
        notifyHtmlChanged();
      },

      undo: function() {
        quill.history.undo();
        notifyHtmlChanged();
      },

      redo: function() {
        quill.history.redo();
        notifyHtmlChanged();
      },

      insertImage: function(url) {
        const u = (url || "").trim();
        if (!u) return;

        // Basic protocol validation (optional)
        // If you allow only https, enforce here:
        // if (!/^https:\/\//i.test(u)) return;

        const range = quill.getSelection(true);
        const index = range ? range.index : quill.getLength();

        quill.insertEmbed(index, "image", u, "user");
        quill.setSelection(index + 1, 0, "user");
        notifyHtmlChanged();
      },

      clear: function() {
        quill.setText("", "user");
        notifyHtmlChanged();
      }
    };

    // Optional: initial notify (so Kotlin knows initial state)
    notifyHtmlChanged();
</script>
</body>
</html>
